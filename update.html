<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث حاسبة Hasba AI</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: white; 
            text-align: center; 
            padding: 40px 20px; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            width: 100%;
            max-width: 450px; 
            background: rgba(30, 41, 59, 0.7); 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .icon {
            width: 90px;
            height: 90px;
            background: #6C4DDA;
            border-radius: 22px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(108, 77, 218, 0.4);
        }
        h1 { color: #e2e8f0; margin-bottom: 15px; font-size: 28px; }
        p { color: #94a3b8; margin-bottom: 35px; line-height: 1.6; font-size: 16px;}
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 16px; 
            border-radius: 14px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 16px; 
            transition: all 0.3s ease; 
            box-sizing: border-box; 
            border: none;
            cursor: pointer;
        }
        .btn-google { background: #10b981; color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-huawei { background: #ef4444; color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-apk { background: #3b82f6; color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn:hover { opacity: 0.9; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .footer { margin-top: 35px; font-size: 13px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🤖</div>
        <h1>Hasba AI</h1>
        <p>يتوفر الآن إصدار جديد وأكثر ذكاءً وسرعة من الآلة الحاسبة!<br>اختر المتجر المناسب لهاتفك لتحميل التحديث فوراً.</p>
        
        <a href="https://play.google.com/store/apps/details?id=com.dezellabs.voicecalculator" class="btn btn-google">تحميل التحديث من Google Play ▶️</a>
        <a href="#" class="btn btn-huawei">تحميل التحديث من Huawei AppGallery 🛍️</a>
        <a href="#" class="btn btn-apk">تحميل التحديث برابط مباشر (APK) ⬇️</a>
        
        <div class="footer">
            جميع الحقوق محفوظة &copy; Dezel Labs 2026
        </div>
    </div>
</body>
</html>
